# Render Blueprint for NeonDeck. One Docker web service serves web + API + WS +
# previews on the port Render injects ($PORT). See DEPLOY.md for the full runbook.
#
# ⚠ FREE-TIER LIMITS (Render): the free web service SLEEPS after ~15 min idle
# (cold start on the next request), and the free tier has NO persistent disk —
# so user projects under IDE_PROJECTS_ROOT are WIPED on every restart/sleep/deploy.
# To keep projects WITHOUT a disk: set the GITHUB_OAUTH_* vars below so users can
# connect their GitHub and have their projects synced to their own repos (see
# DEPLOY.md → "Connect GitHub"). Or upgrade the plan and uncomment `disk:` below.
services:
  - type: web
    name: neondeck
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true                 # every push to the connected branch redeploys
    envVars:
      - key: IDE_DAEMON_HOST
        value: 0.0.0.0
      - key: IDE_WEB_DIR
        value: /app/web/dist
      - key: IDE_PROJECTS_ROOT
        value: /data/projects        # ephemeral on free (no disk) — see note above
      # Secrets / per-deploy values — set these in the Render dashboard (sync:false
      # means "don't store the value in this file"; you'll be prompted on apply):
      - key: AGENT_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      # ---- Stripe (real billing). Leave UNSET to keep the simulated upgrade
      # fallback; set ALL FOUR to take real payments. See DEPLOY.md → "Stripe". ----
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_MAX
        sync: false
      # ---- GitHub OAuth (per-user project sync). Leave UNSET to disable; set both
      # to let users "Connect GitHub" and sync projects to their own repos. ----
      - key: GITHUB_OAUTH_CLIENT_ID
        sync: false
      - key: GITHUB_OAUTH_CLIENT_SECRET
        sync: false
      # ---- Admin dashboard + maintenance. Comma-separated login emails granted
      # admin (the ops dashboard: view sessions, cancel agents, maintenance toggle).
      # Optional — defaults to the owner email in code; set to override / add admins. ----
      - key: ADMIN_EMAILS
        sync: false
      # IDE_APP_ORIGIN / IDE_ALLOWED_ORIGINS are NOT needed: the daemon auto-trusts
      # same-origin requests (web + API + WS share one origin), and Stripe's checkout
      # return URL is auto-derived from Render's injected RENDER_EXTERNAL_URL. Only set
      # IDE_APP_ORIGIN if you serve the web on a DIFFERENT origin (e.g. a custom domain
      # whose host differs from the onrender.com URL).
    # disk:                          # uncomment on a PAID plan for persistent projects
    #   name: data
    #   mountPath: /data
    #   sizeGB: 1
